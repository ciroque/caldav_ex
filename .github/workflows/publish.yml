name: Publish to Hex.pm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  verify:
    name: Verify CI Status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for CI to complete
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.ref }}
          check-name: 'Test (Elixir 1.19 / OTP 28)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

      - name: Verify all CI checks passed
        run: |
          echo "All CI checks must pass before publishing"

  publish:
    name: Publish to Hex.pm
    runs-on: ubuntu-latest
    needs: verify
    environment:
      name: hex-pm
      url: https://hex.pm/packages/caldav_ex
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19'
          otp-version: '28'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-publish-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-publish-

      - name: Install dependencies
        run: mix deps.get

      - name: Extract version from tag
        id: version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "Tag version: $TAG_VERSION"

      - name: Verify version matches mix.exs
        run: |
          VERSION_IN_MIX=$(grep '@version' mix.exs | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION=${{ steps.version.outputs.tag_version }}
          if [ "$VERSION_IN_MIX" != "$TAG_VERSION" ]; then
            echo "Error: Version in mix.exs ($VERSION_IN_MIX) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $VERSION_IN_MIX"

      - name: Run tests
        run: mix test

      - name: Build package
        run: mix hex.build

      - name: Publish to Hex.pm
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: |
            ## CalDAVEx ${{ github.ref_name }}

            Published to Hex.pm: https://hex.pm/packages/caldav_ex/${{ steps.version.outputs.tag_version }}

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: false
